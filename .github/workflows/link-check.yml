name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links and assets
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            index.html 404.html
          fail: true
