name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check local asset references
        run: node scripts/check-local-links.js

      - name: Validate HTML syntax
        run: npx --yes html-validate --config .html-validate.json index.html 404.html
