name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  htmlhint:
    name: HTML lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint HTML
        run: npx --yes htmlhint index.html 404.html
