name: CI

on:
  push:
    paths:
      - "**/*.html"
      - "scripts/check-links.js"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**/*.html"
      - "scripts/check-links.js"
      - ".github/workflows/ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate HTML
        run: npx --yes html-validate index.html 404.html

      - name: Check local links and asset references
        run: node scripts/check-links.js index.html 404.html
